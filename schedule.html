<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Command Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="/theme.js"></script>
  <style>
    /* Tactical Date/Time Picker Styles */
    .tp-trigger { 
      background: rgba(0,220,160,0.05); 
      border: 1px solid rgba(0,220,160,0.2); 
      color: #00dca0; 
      padding: 12px; 
      border-radius: 4px; 
      font-family: var(--mono); 
      width: 100%; 
      margin-top: 10px; 
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    .tp-trigger:hover { border-color: #00dca0; background: rgba(0,220,160,0.1); }
    .tp-trigger .tp-icon { opacity: 0.6; }

    .picker-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
    .picker-modal.open { display: flex; }
    .picker-content { background: #0a0e12; border: 1px solid var(--border-hi); width: 100%; max-width: 340px; border-radius: var(--r); box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow: hidden; animation: fadeUp 0.3s var(--ease); }
    .picker-header { padding: 15px 20px; background: rgba(0,220,160,0.05); border-bottom: 1px solid rgba(0,220,160,0.15); display: flex; justify-content: space-between; align-items: center; }
    .picker-body { padding: 20px; }

    /* Calendar */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-family: var(--ui); color: #fff; font-weight: bold; letter-spacing: 1px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; min-height: 205px; }
    .cal-day-label { font-size: 9px; color: var(--teal); opacity: 0.5; margin-bottom: 8px; }
    .cal-day { padding: 8px 0; font-size: 11px; cursor: pointer; border-radius: 2px; color: #cbd5e1; transition: all 0.1s; }
    .cal-day:hover:not(.disabled) { background: rgba(0,220,160,0.15); color: #fff; }
    .cal-day.selected { background: var(--teal) !important; color: #000 !important; font-weight: bold; }
    .cal-day.disabled { opacity: 0.15; cursor: not-allowed; pointer-events: none; }
    .cal-day.today { color: var(--teal); border: 1px solid rgba(0,220,160,0.3); }

    /* Time */
    .time-selector { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(0,220,160,0.1); }
    .time-unit { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .time-btn { background: none; border: none; color: var(--teal); font-size: 18px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
    .time-btn:hover { opacity: 1; }
    .time-val { font-family: var(--mono); font-size: 24px; color: #fff; font-weight: bold; width: 45px; text-align: center; background: transparent; border: 1px solid transparent; outline: none; border-radius: 2px; }
    .time-val:focus { border-color: rgba(0,220,160,0.4); background: rgba(0,220,160,0.05); }
    .time-val::-webkit-inner-spin-button, .time-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .time-sep { font-size: 20px; color: var(--teal); opacity: 0.5; margin-top: -5px; }
    
    .ampm-btn { background: rgba(0,220,160,0.1); border: 1px solid rgba(0,220,160,0.3); color: var(--teal); padding: 5px 10px; border-radius: 3px; font-family: var(--mono); font-size: 14px; font-weight: bold; cursor: pointer; margin-left: 10px; transition: all 0.2s; }
    .ampm-btn:hover { background: rgba(0,220,160,0.2); border-color: var(--teal); }

    .picker-footer { padding: 15px 20px; display: flex; gap: 10px; }
    .p-btn { flex: 1; padding: 10px; border-radius: 2px; font-family: var(--mono); font-size: 11px; cursor: pointer; font-weight: bold; transition: all 0.2s; border: 1px solid transparent; }
    .p-btn.set { background: var(--teal); color: #000; border-color: var(--teal); }
    .p-btn.set:hover { opacity: 0.9; }
    .p-btn.cancel { background: rgba(255,255,255,0.03); color: #cbd5e1; border-color: rgba(255,255,255,0.1); }
    .p-btn.cancel:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
  <div class="scanline"></div>
  
  <div class="top-left-menu" id="topLeftMenu">
    <button class="nav-btn" onclick="document.getElementById('navDropdown').classList.toggle('open')" title="SYSTEM MENU">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <div class="nav-dropdown" id="navDropdown">
      <a href="/home" class="nav-drop-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        DASHBOARD
      </a>
      <a href="/schedule" class="nav-drop-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        SCHEDULER
      </a>
      <a href="/requests" class="nav-drop-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        HTTP LOGS
      </a>
      <a href="/statuslogs" class="nav-drop-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        STATUS LOGS
      </a>
      <a href="/schedule/logs" class="nav-drop-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        SCHEDULE LOGS
      </a>
      <a href="/vault/list" class="nav-drop-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        VAULT
      </a>
      <a href="/logout" class="nav-drop-item" style="color:#ef4444; border-top:1px solid rgba(239,68,68,0.2)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        LOGOUT
      </a>
    </div>
  </div>

  <button class="reload-btn" onclick="location.reload()" title="RELOAD SYSTEM">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6"></path>
      <path d="M1 20v-6h6"></path>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
  </button>

  <!-- Error Modal -->
  <div id="errorModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="mono-xs" style="color:var(--red)">ERROR LOG DETAILS</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="errorModalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content confirm">
      <div class="modal-header confirm">
        <span class="mono-xs" style="color:var(--red)">SYSTEM CONFIRMATION</span>
      </div>
      <div class="modal-body confirm">
        <p id="confirmMessage" style="color:var(--text); font-size:12px; margin-bottom:20px;"></p>
        <div style="display:flex; gap:10px;">
          <button id="confirmBtn" class="confirm-btn yes">CLEAR LOGS</button>
          <button onclick="closeConfirm()" class="confirm-btn no">ABORT</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Picker Modal -->
  <div id="pickerModal" class="picker-modal">
    <div class="picker-content">
      <div class="picker-header">
        <span style="color:var(--teal); font-family:var(--mono); font-size:13px; font-weight:900; letter-spacing:1.5px;">Choose Execution Time</span>
        <button class="modal-close" onclick="closePicker()">&times;</button>
      </div>
      <div class="picker-body">
        <div class="cal-header">
          <button class="time-btn" id="prevMonthBtn" onclick="prevMonth()">&lt;</button>
          <span id="monthYearDisplay">MAY 2024</span>
          <button class="time-btn" id="nextMonthBtn" onclick="nextMonth()">&gt;</button>
        </div>
        <div class="cal-grid" id="calGrid">
          <div class="cal-day-label">SU</div><div class="cal-day-label">MO</div><div class="cal-day-label">TU</div><div class="cal-day-label">WE</div><div class="cal-day-label">TH</div><div class="cal-day-label">FR</div><div class="cal-day-label">SA</div>
          <!-- Days will be injected here -->
        </div>

        <div class="time-selector">
          <div class="time-unit">
            <button type="button" class="time-btn" onclick="adjTime('h', 1); event.preventDefault();">▲</button>
            <input type="number" class="time-val" id="hourVal" value="12" min="1" max="12" oninput="validateTimeInput(this, 12)" onblur="finalizeTimeInput(this, 12)">
            <button type="button" class="time-btn" onclick="adjTime('h', -1); event.preventDefault();">▼</button>
          </div>
          <span class="time-sep">:</span>
          <div class="time-unit">
            <button type="button" class="time-btn" onclick="adjTime('m', 1); event.preventDefault();">▲</button>
            <input type="number" class="time-val" id="minVal" value="00" min="0" max="59" oninput="validateTimeInput(this, 59)" onblur="finalizeTimeInput(this, 59)">
            <button type="button" class="time-btn" onclick="adjTime('m', -1); event.preventDefault();">▼</button>
          </div>
          <button type="button" class="ampm-btn" id="ampmBtn" onclick="toggleAMPM(); event.preventDefault();">AM</button>
        </div>
      </div>
      <div class="picker-footer">
        <button class="p-btn cancel" onclick="closePicker()">CANCEL</button>
        <button class="p-btn set" onclick="confirmPicker()">SET TIME</button>
      </div>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <div class="scan-pulse"></div>

    <div class="panel-header">
      <div class="header-side">
        <div class="status-dot green" id="dot"></div>
      </div>
      <h1 class="panel-title">SCHEDULER</h1>
      <div class="header-side right">
        <span class="mono-xs" id="clock">--:--:--</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <label class="field-label" for="key">MACROS KEY</label>
      <div class="input-wrap">
        <input type="text" id="key" class="stealth-input" placeholder="ENTER KEY..." autocomplete="off" spellcheck="false">
        <div class="input-underline"></div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">COMMAND</label>
      <div class="dropdown" id="dropdown">
        <button class="dd-trigger" id="ddTrigger" type="button" onclick="toggleDropdown()">
          <span class="dd-value" id="ddValue">— SELECT COMMAND —</span>
          <svg class="dd-arrow" id="ddArrow" width="10" height="6" viewBox="0 0 10 6" fill="none">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="dd-menu" id="ddMenu">
          <div class="dd-search-wrap">
            <input type="text" id="ddSearch" placeholder="SEARCH SCHEDULE..." autocomplete="off">
          </div>
          
          <div class="dd-group-label">SYSTEM & POWER</div>
          <button class="dd-item" type="button" data-value="cancel_all_prev_macros" onclick="selectCmd(this)">
            <svg class="dd-icon red" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            TERMINATE ALL MACROS
          </button>
          <button class="dd-item" type="button" data-value="batterysaver_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            BATTERY SAVER ON
          </button>
          <button class="dd-item" type="button" data-value="batterysaver_off" onclick="selectCmd(this)">
            <svg class="dd-icon dim" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            BATTERY SAVER OFF
          </button>
          <button class="dd-item" type="button" data-value="darktheme_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            DARK THEME ON
          </button>
          <button class="dd-item" type="button" data-value="darktheme_off" onclick="selectCmd(this)">
            <svg class="dd-icon amber" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            DARK THEME OFF
          </button>
          <button class="dd-item" type="button" data-value="test" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            TEST STATUS
          </button>

          <div class="dd-group-label">DEVICE CONTROL</div>
          <button class="dd-item" type="button" data-value="lock" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            LOCK DEVICE
          </button>
          <button class="dd-item" type="button" data-value="aeroplane_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-1.1-.3-2.3.3-2.8 1.4-.3.9-.1 1.8.4 2.4l7.1 4.4L6.7 20c-.5.5-.6 1.2-.2 1.6s1.1.3 1.6-.2l5.1-3.3 4.4 7.1c.6.5 1.5.7 2.4.4 1.1-.5 1.7-1.7 1.4-2.8z"/></svg>
            AEROPLANE MODE ON
          </button>
          <button class="dd-item" type="button" data-value="aeroplane_off" onclick="selectCmd(this)">
            <svg class="dd-icon dim" viewBox="0 0 24 24"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-1.1-.3-2.3.3-2.8 1.4-.3.9-.1 1.8.4 2.4l7.1 4.4L6.7 20c-.5.5-.6 1.2-.2 1.6s1.1.3 1.6-.2l5.1-3.3 4.4 7.1c.6.5 1.5.7 2.4.4 1.1-.5 1.7-1.7 1.4-2.8z"/><line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2"/></svg>
            AEROPLANE MODE OFF
          </button>
          <button class="dd-item" type="button" data-value="wifi_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
            WIFI ENABLE
          </button>
          <button class="dd-item" type="button" data-value="wifi_off" onclick="selectCmd(this)">
            <svg class="dd-icon dim" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2"/></svg>
            WIFI DISABLE
          </button>
          <button class="dd-item" type="button" data-value="bluetooth_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/></svg>
            BT ENABLE
          </button>
          <button class="dd-item" type="button" data-value="bluetooth_off" onclick="selectCmd(this)">
            <svg class="dd-icon dim" viewBox="0 0 24 24"><polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/><line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2"/></svg>
            BT DISABLE
          </button>
          <button class="dd-item" type="button" data-value="autorotate_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            AUTO ROTATE ENABLE
          </button>
          <button class="dd-item" type="button" data-value="autorotate_off" onclick="selectCmd(this)">
            <svg class="dd-icon dim" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/><line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2"/></svg>
            AUTO ROTATE DISABLE
          </button>
          <button class="dd-item" type="button" data-value="accserv_md_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
            MD ACCSERV ENABLE
          </button>
          <button class="dd-item" type="button" data-value="accserv_an_on" onclick="selectCmd(this)">
            <svg class="dd-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            AN ACCSERV ENABLE
          </button>

          <div class="dd-group-label">LOCATION & TRACKING</div>
          <button class="dd-item" type="button" data-value="location_share_recent" onclick="selectCmd(this)">
            <svg class="dd-icon amber" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/><polyline points="12 6 12 10 14 12"/></svg>
            GPS SYNC (RECENT)
          </button>
          <button class="dd-item" type="button" data-value="location_share" onclick="selectCmd(this)">
            <svg class="dd-icon amber" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/><polyline points="12 6 12 10 14 12"/></svg>
            GPS SYNC (LIVE)
          </button>

          <div class="dd-group-label">MEDIA & SURVEILLANCE</div>
          <button class="dd-item" type="button" data-value="photo_click" onclick="selectCmd(this)">
            <svg class="dd-icon amber" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            TAKE PHOTO
          </button>
          <button class="dd-item" type="button" data-value="videorecording_on" onclick="selectCmd(this)">
            <svg class="dd-icon amber" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><circle cx="8" cy="12" r="2"/></svg>
            RECORD VIDEO
          </button>
          <button class="dd-item" type="button" data-value="microphone_record" onclick="selectCmd(this)">

    <div class="field-group" id="timeWrapper">
      <label class="field-label">EXECUTION TIME</label>
      <div class="input-wrap">
        <div class="tp-trigger" id="timeTrigger" onclick="openPicker()">
          <span id="displayTime">— NOT SET —</span>
          <svg class="tp-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </div>
        <input type="hidden" id="scheduleTime">
      </div>
    </div>

    <div class="field-group" id="cmd2Wrapper" style="display: none; height: 0; overflow: hidden; margin-bottom: 0;">
      <label class="field-label" id="cmd2Label">PARAMETER</label>
      <div class="input-wrap">
        <textarea id="cmd2" placeholder="ENTER MESSAGE..." autocomplete="off" spellcheck="false" rows="1"></textarea>
        <div class="input-underline"></div>
      </div>
    </div>

    <div class="divider"></div>

    <button class="exec-btn" id="execBtn" onclick="submitSchedule()">
      <div class="exec-icon-wrap">
        <span class="exec-icon">▶</span>
        <span class="spinner"></span>
      </div>
      <span class="exec-label">SCHEDULE COMMAND</span>
      <div class="exec-ripple" id="ripple"></div>
    </button>

    <div class="terminal">
      <div class="terminal-bar">
        <span class="mono-xs">STATUS</span>
        <div class="term-dots">
          <span></span>
          <button id="clearLogsBtn" title="CLEAR LOGS" onclick="clearLogs()"></button>
        </div>
      </div>
      <div class="terminal-body" id="terminalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    /* Tactical Picker Logic */
    let selectedDate = new Date();
    selectedDate.setMinutes(selectedDate.getMinutes() + 5);
    let viewDate = new Date(selectedDate);
    let tempDate = new Date(selectedDate);

    function openPicker() {
      tempDate = new Date(selectedDate);
      viewDate = new Date(tempDate);
      renderCalendar();
      updateTimeDisplay();
      document.getElementById('pickerModal').classList.add('open');
    }

    function closePicker() {
      document.getElementById('pickerModal').classList.remove('open');
    }

    function renderCalendar() {
      const grid = document.getElementById('calGrid');
      const monthYear = document.getElementById('monthYearDisplay');
      const now = new Date();
      const maxDate = new Date(now.getFullYear(), now.getMonth() + 3, now.getDate());

      monthYear.innerText = viewDate.toLocaleString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();

      // Month scrolling restrictions
      const prevBtn = document.getElementById('prevMonthBtn');
      const nextBtn = document.getElementById('nextMonthBtn');
      
      const isCurrentMonth = viewDate.getMonth() === now.getMonth() && viewDate.getFullYear() === now.getFullYear();
      const isMaxMonth = viewDate.getMonth() === maxDate.getMonth() && viewDate.getFullYear() === maxDate.getFullYear();
      
      prevBtn.style.opacity = isCurrentMonth ? '0.1' : '0.4';
      prevBtn.style.pointerEvents = isCurrentMonth ? 'none' : 'auto';
      nextBtn.style.opacity = isMaxMonth ? '0.1' : '0.4';
      nextBtn.style.pointerEvents = isMaxMonth ? 'none' : 'auto';

      const labels = Array.from(grid.querySelectorAll('.cal-day-label'));
      grid.innerHTML = '';
      labels.forEach(l => grid.appendChild(l));

      const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
      const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const d = document.createElement('div');
        d.className = 'cal-day disabled';
        grid.appendChild(d);
      }

      for (let i = 1; i <= daysInMonth; i++) {
        const d = document.createElement('div');
        d.className = 'cal-day';
        d.innerText = i;
        
        const thisDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), i);
        const dateStr = thisDate.toDateString();
        const nowStr = now.toDateString();
        const selStr = tempDate.toDateString();

        const isPast = thisDate < new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const isTooFuture = thisDate > maxDate;

        if (isPast || isTooFuture) d.classList.add('disabled');
        if (dateStr === nowStr) d.classList.add('today');
        if (dateStr === selStr) d.classList.add('selected');

        d.onclick = () => {
          if (isPast || isTooFuture) return;
          tempDate.setFullYear(thisDate.getFullYear());
          tempDate.setMonth(thisDate.getMonth());
          tempDate.setDate(i);
          renderCalendar();
        };
        grid.appendChild(d);
      }
    }

    function prevMonth() {
      const now = new Date();
      if (viewDate.getMonth() === now.getMonth() && viewDate.getFullYear() === now.getFullYear()) return;
      viewDate.setMonth(viewDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      const now = new Date();
      const maxDate = new Date(now.getFullYear(), now.getMonth() + 3, now.getDate());
      if (viewDate.getMonth() === maxDate.getMonth() && viewDate.getFullYear() === maxDate.getFullYear()) return;
      viewDate.setMonth(viewDate.getMonth() + 1);
      renderCalendar();
    }

    function toggleAMPM() {
      let h = tempDate.getHours();
      if (h >= 12) h -= 12;
      else h += 12;
      tempDate.setHours(h);
      updateTimeDisplay();
    }

    function validateTimeInput(el, max) {
      let val = parseInt(el.value);
      if (isNaN(val)) return;
      if (val > max) el.value = max;
      
      // Update tempDate based on current input
      let cleanVal = parseInt(el.value);
      if (el.id === 'hourVal') {
        let isPM = tempDate.getHours() >= 12;
        let h = cleanVal;
        if (h > 12) h = 12;
        if (isPM && h < 12) h += 12;
        if (!isPM && h === 12) h = 0;
        tempDate.setHours(h);
      } else {
        tempDate.setMinutes(cleanVal);
      }
      syncAMPMBtn();
    }

    function finalizeTimeInput(el, max) {
      let val = parseInt(el.value);
      const min = (el.id === 'hourVal' ? 1 : 0);
      if (isNaN(val) || val < min) val = min;
      if (val > max) val = max;
      el.value = val.toString().padStart(2, '0');
      updateTimeDisplay();
    }

    function syncAMPMBtn() {
      const isPM = tempDate.getHours() >= 12;
      document.getElementById('ampmBtn').innerText = isPM ? 'PM' : 'AM';
    }

    function adjTime(unit, amt) {
      if (unit === 'h') {
        let currentH = tempDate.getHours();
        let newH = currentH + amt;
        if (newH > 23) newH = 0;
        if (newH < 0) newH = 23;
        tempDate.setHours(newH);
      } else {
        let currentM = tempDate.getMinutes();
        let newM = currentM + amt;
        if (newM > 59) newM = 0;
        if (newM < 0) newM = 59;
        tempDate.setMinutes(newM);
      }
      updateTimeDisplay();
    }

    function updateTimeDisplay() {
      let h = tempDate.getHours();
      const isPM = h >= 12;
      h = h % 12;
      if (h === 0) h = 12;
      
      document.getElementById('hourVal').value = h.toString().padStart(2, '0');
      document.getElementById('minVal').value = tempDate.getMinutes().toString().padStart(2, '0');
      document.getElementById('ampmBtn').innerText = isPM ? 'PM' : 'AM';
    }

    function confirmPicker() {
      if (tempDate < new Date()) {
        setStatus("CANNOT SCHEDULE IN PAST", "err");
        return;
      }
      selectedDate = new Date(tempDate);
      const display = document.getElementById('displayTime');
      const hidden = document.getElementById('scheduleTime');
      
      const options = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
      display.innerText = selectedDate.toLocaleString('en-US', options).toUpperCase();
      hidden.value = selectedDate.toISOString();
      
      closePicker();
      setStatus("TARGET UPDATED: " + display.innerText);
    }

    /* Override execute with submitSchedule */
    async function submitSchedule() {
      if (document.getElementById('execBtn').disabled) return;
      
      const key = document.getElementById("key").value.trim();
      const timeStr = document.getElementById('scheduleTime').value;
      const cmd2 = document.getElementById('cmd2').value.trim();
      const btn = document.getElementById('execBtn');

      if (!key) {
        setStatus("MACROS KEY REQUIRED", "err");
        shake(document.getElementById("key"));
        return;
      }

      if (!selectedCmd) {
        setStatus("SELECT A COMMAND FIRST", "err");
        shake(document.getElementById("ddTrigger"));
        return;
      }

      if (!timeStr) {
        setStatus("TARGET TIME REQUIRED", "err");
        shake(document.getElementById("timeTrigger"));
        return;
      }

      const targetMs = new Date(timeStr).getTime();
      if (targetMs <= Date.now()) {
        setStatus("TIME MUST BE IN FUTURE", "err");
        shake(document.getElementById("timeTrigger"));
        return;
      }

      btn.classList.add('loading');
      setStatus(`QUEUING ${selectedCmdDisplay.toUpperCase()}...`, "busy");

      try {
        const resp = await fetch(`/schedule/create?cmd=${selectedCmd}&time=${targetMs}&key=${encodeURIComponent(key)}&cmd2=${encodeURIComponent(cmd2)}`, { method: 'POST' });
        if (resp.ok) {
          setStatus("SUCCESS: COMMAND SCHEDULED", "ok");
          setStatus(`TARGET: ${new Date(targetMs).toLocaleString()}`);
        } else {
          const errText = await resp.text();
          if (resp.status === 409) {
            setStatus("CONFLICT: TIME ALREADY TAKEN", "err");
          } else {
            setStatus("FAIL: " + errText, "err");
          }
        }
      } catch (e) {
        setStatus(`ERROR: ${e.message}`, "err");
      } finally {
        setTimeout(() => btn.classList.remove('loading'), 1000);
      }
    }

    // Hide status bar elements if they accidentally exist in clone
    document.querySelectorAll('.hw-status-bar, .hw-item').forEach(el => el.style.display = 'none');
    
    // Universal Backspace Navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        const t = e.target;
        const isEditable = t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable;
        if (!isEditable) {
          e.preventDefault();
          window.history.back();
        }
      }
    });

    // Toggle selection mode via Ctrl key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Control') {
        document.body.classList.add('ctrl-select-mode');
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'Control') {
        document.body.classList.remove('ctrl-select-mode');
      }
    });
    window.addEventListener('blur', () => {
      document.body.classList.remove('ctrl-select-mode');
    });

    // Initial status
    setTimeout(() => {
      if (document.getElementById('terminalBody').children.length === 0) {
        setStatus("IDLE — AWAITING SCHEDULING INPUT");
      }
    }, 100);
  </script>
