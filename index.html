<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .login-title {
      font-size: 24px;
      color: var(--teal);
      margin-bottom: 30px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .error-msg {
      color: var(--red);
      font-size: 12px;
      margin-top: 10px;
      height: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .lock-shackle {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: 17px 11px;
    }
    .exec-btn:hover .lock-shackle {
      transform: translateY(-1.5px);
    }
    .lock-icon.unlocked .lock-shackle {
      transform: translateY(-3.5px) rotate(-22deg);
    }
    .exec-icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
      cursor: pointer;
    }
    .exec-icon-wrap:hover {
      transform: scale(1.15);
      color: #fff;
    }
    @media (max-width: 768px) {
      html, body {
        overflow: hidden;
        height: 100%;
        overscroll-behavior: none;
      }
      .login-container {
        top: 48% !important;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
  <div class="scanline"></div>

  <!-- Corner Reload Button -->
  <button class="reload-btn" onclick="location.reload()" title="RELOAD SYSTEM">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6"></path>
      <path d="M1 20v-6h6"></path>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
  </button>

  <div class="container login-container">
    <div class="panel-header">
      <div class="header-side">
        <div class="status-dot busy" id="dot"></div>
        <span class="mono-xs">SYSTEM LOCKED</span>
      </div>
      <h1 class="panel-title">GATEWAY</h1>
      <div class="header-side right">
        <span class="mono-xs" id="clock">--:--:--</span>
      </div>
    </div>

    <div class="divider"></div>
    
    <div class="login-title">Identification Required</div>

    <form id="loginForm">
      <div class="field-group">
        <label class="field-label" for="accessKey">ACCESS KEY</label>
        <div class="input-wrap">
          <input
            type="password"
            id="accessKey"
            class="stealth-input"
            placeholder="ENTER ACCESS KEY..."
            autocomplete="off"
            spellcheck="false"
          >
          <div class="input-underline"></div>
        </div>
      </div>

      <div class="divider" style="margin-top: 10px;"></div>

      <button class="exec-btn" id="loginBtn" type="submit">
        <div class="exec-icon-wrap" id="lockIconWrap" title="TOGGLE PASSWORD VISIBILITY">
          <svg class="lock-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path class="lock-shackle" d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <span class="exec-label">AUTHORIZE</span>
        <div class="exec-ripple" id="ripple"></div>
      </button>
    </form>

    <!-- Status terminal -->
    <div class="terminal" style="margin-top: 30px; text-align: left;">
      <div class="terminal-bar">
        <span class="mono-xs">GATEWAY STATUS</span>
        <div class="term-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="terminal-body" id="terminalBody">
        <div class="t-line">
          <span class="t-prompt">›</span>
          <span class="t-text">IDLE — AWAITING ACCESS KEY</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isRateLimitedActive = false;

    // Lock Icon Interactivity (Toggle Decrypted/Plaintext View & Shackle Opening Animation)
    const accessKeyInput = document.getElementById('accessKey');
    const lockIconWrap = document.getElementById('lockIconWrap');
    const lockSvg = document.querySelector('.lock-icon');

    if (accessKeyInput && lockIconWrap && lockSvg) {
      lockIconWrap.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        haptic();
        if (accessKeyInput.type === 'password') {
          accessKeyInput.type = 'text';
          lockSvg.classList.add('unlocked');
          setStatus("DECRYPTED VIEW ENABLED", "busy");
        } else {
          accessKeyInput.type = 'password';
          setStatus("DECRYPTED VIEW DISABLED");
          if (accessKeyInput.value.length === 0) {
            lockSvg.classList.remove('unlocked');
          }
        }
      });

      accessKeyInput.addEventListener('input', () => {
        if (accessKeyInput.value.length > 0 || accessKeyInput.type === 'text') {
          lockSvg.classList.add('unlocked');
        } else {
          lockSvg.classList.remove('unlocked');
        }
      });
    }

    function triggerRateLimit(seconds) {
      if (isRateLimitedActive || seconds <= 0) return;
      isRateLimitedActive = true;

      const inputEl = document.getElementById('accessKey');
      const btn = document.getElementById('loginBtn');
      
      inputEl.disabled = true;
      btn.disabled = true;
      inputEl.placeholder = "LOCKED...";

      const container = document.querySelector('.container');
      container.style.animation = "shake 0.38s cubic-bezier(0.36, 0.07, 0.19, 0.97)";

      let activeRateLimitLine = null;
      function setRateLimitStatus(msg) {
        const body = document.getElementById("terminalBody");
        const dot = document.getElementById("dot");
        dot.className = "status-dot error";

        if (activeRateLimitLine) {
          activeRateLimitLine.querySelector('.t-text').textContent = msg;
        } else {
          const line = document.createElement("div");
          line.className = "t-line";

          const span = document.createElement("span");
          span.className = "t-text err";
          span.textContent = msg;

          line.innerHTML = `<span class="t-prompt">›</span>`;
          line.appendChild(span);
          body.appendChild(line);
          activeRateLimitLine = line;
        }
        body.scrollTop = body.scrollHeight;
      }

      const timer = setInterval(() => {
        if (seconds <= 0) {
          clearInterval(timer);
          isRateLimitedActive = false;
          inputEl.disabled = false;
          btn.disabled = false;
          inputEl.placeholder = "ENTER ACCESS KEY...";
          setStatus("UNLOCKED — READY", "ok");
        } else {
          const m = Math.floor(seconds / 60);
          const s = (seconds % 60).toString().padStart(2, '0');
          setRateLimitStatus(`TOO MANY ATTEMPTS — LOCKED FOR ${m}:${s}`);
          seconds--;
        }
      }, 1000);

      // Initial call
      const mVal = Math.floor(seconds / 60);
      const sVal = (seconds % 60).toString().padStart(2, '0');
      setRateLimitStatus(`TOO MANY ATTEMPTS — LOCKED FOR ${mVal}:${sVal}`);
      seconds--;
    }

    // Redirect to home if already authenticated, or show rate limit status
    fetch('/api/auth/check')
      .then(res => res.json())
      .catch(() => ({ loggedIn: false }))
      .then(data => {
        if (data && data.loggedIn) {
          window.location.replace('/home');
        } else if (data && data.rateLimited) {
          triggerRateLimit(data.seconds);
        }
      });

    // Status helper
    function setStatus(msg, state) {
      const body = document.getElementById("terminalBody");
      const dot = document.getElementById("dot");

      const line = document.createElement("div");
      line.className = "t-line";

      const span = document.createElement("span");
      span.className = "t-text " + (state || "");
      span.textContent = msg;

      line.innerHTML = `<span class="t-prompt">›</span>`;
      line.appendChild(span);

      body.appendChild(line);
      body.scrollTop = body.scrollHeight;

      // Update status dot
      dot.className = "status-dot " + (state === "busy" ? "busy" : state === "err" ? "error" : "");
    }

    // Simple Clock
    function tick() {
      const now = new Date();
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const seconds = now.getSeconds().toString().padStart(2, '0');
      document.getElementById("clock").textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
    }
    
    function haptic() {
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(15);
      }
    }

    tick();
    setInterval(tick, 1000);

    // Login Logic
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      haptic();
      const inputEl = document.getElementById('accessKey');
      const key = inputEl.value.trim();
      const btn = document.getElementById('loginBtn');

      if (!key) {
        setStatus("ACCESS KEY REQUIRED", "err");
        shake(inputEl);
        return;
      }

      btn.disabled = true;
      setStatus(`VERIFYING ACCESS KEY ...`, "busy");

      // Small delay for terminal effect
      setTimeout(() => {
        window.location.href = `/login?key=${encodeURIComponent(key)}`;
      }, 600);
    };

    // Show error if redirected back with error
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'rate_limit') {
      let seconds = parseInt(urlParams.get('seconds')) || 900;
      triggerRateLimit(seconds);
    } else if (urlParams.has('error')) {
      setStatus("ACCESS DENIED — INVALID CREDENTIALS", "err");
      // Shake effect
      const container = document.querySelector('.container');
      container.style.animation = "shake 0.38s cubic-bezier(0.36, 0.07, 0.19, 0.97)";
    }

    // Shake effect helper
    function shake(el) {
      el.classList.remove("glitch-effect");
      void el.offsetWidth;
      el.classList.add("glitch-effect");
      el.addEventListener("animationend", () => el.classList.remove("glitch-effect"), { once: true });
    }

    /* ── Parallax Grid ─────────────────────────────────────────── */
    if (window.innerWidth > 768) {
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX - window.innerWidth / 2) / 45;
        const y = (e.clientY - window.innerHeight / 2) / 45;
        const grid = document.querySelector('.bg-grid');
        if (grid) grid.style.transform = `translate(${x}px, ${y}px)`;
      });
    }

    // Backspace Navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && e.target.tagName !== 'INPUT') {
        window.history.back();
      }
    });
  </script>
</body>
</html>
