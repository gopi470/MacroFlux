<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remote Phone Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Remote Control</h1>

  <input type="password" id="key" placeholder="Enter Key">

  <div class="buttons">
    <button onclick="sendCommand('lock')">Lock</button>
    <button onclick="sendCommand('torch')">Torch</button>
  </div>

  <p id="status"></p>
</div>

<script src="script.js"></script>
</body>
</html>
